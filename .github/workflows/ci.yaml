name: Python CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        working-directory: backend
        run: |
          uv sync

      - name: Run Ruff
        working-directory: backend
        run: |
          uv run ruff check .

      - name: Run Tests
        working-directory: backend
        run: |
          uv run pytest -v