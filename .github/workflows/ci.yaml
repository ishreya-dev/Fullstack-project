name: Python CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27012:27017

        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6372:6379

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install Dependencies
        working-directory: backend
        run: |
          uv sync

      - name: Run Ruff
        working-directory: backend
        run: |
          uv run ruff check .

      - name: Create .env for CI
        working-directory: backend
        run: |
          cat > .env <<EOF
          jwt_secret=test-secret
          refresh_token_secret=test-refresh-secret
          smtp_user=test@example.com
          smtp_password=test-password
          smtp_host=localhost
          smtp_port=1025
          smtp_mail_from=test@example.com
          coolify_api_url=http://localhost
          coolify_api_key=test-key
          coolify_application_id=test-app
          aws_access_key_id=test
          aws_secret_access_key=test
          stripe_api_key=test
          stripe_publishable_key=test
          stripe_secret_key=test
          stripe_webhook_secret=test
          redis_uri=redis://localhost:6372/0
          EOF

      - name: Wait for MongoDB to be ready
        run: |
          python3 -c "
          import socket
          import time
          for i in range(30):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(1)
                  result = sock.connect_ex(('localhost', 27012))
                  sock.close()
                  if result == 0:
                      print('MongoDB is ready on port 27012')
                      exit(0)
              except Exception as e:
                  pass
              print(f'Waiting for MongoDB... ({i+1}/30)')
              time.sleep(1)
          print('MongoDB failed to start within 30 seconds')
          exit(1)
          "

      - name: Wait for Redis to be ready
        run: |
          python3 -c "
          import socket
          import time
          for i in range(30):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(1)
                  result = sock.connect_ex(('localhost', 6372))
                  sock.close()
                  if result == 0:
                      print('Redis is ready on port 6372')
                      exit(0)
              except Exception as e:
                  pass
              print(f'Waiting for Redis... ({i+1}/30)')
              time.sleep(1)
          print('Redis failed to start within 30 seconds')
          exit(1)
          "

      - name: Run Tests
        working-directory: backend
        run: |
          uv run pytest -v